<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ODFlow Pro｜台灣學生社團 ODF 文件工作台</title>
  <meta name="description" content="ODFlow Pro：一站式社團文件管理站，提供 ODT/ODS 範本下載、文件填寫預覽與社團評鑑整理。" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🏫</div>
        <div>
          <h1>ODFlow Pro</h1>
          <p>台灣學生社團 ODF 文件工作台</p>
        </div>
      </div>

      <nav class="nav" aria-label="主選單">
        <button data-page="home" class="nav-item active"><span>🏠</span>首頁</button>
        <button data-page="dashboard" class="nav-item"><span>📊</span>儀表板</button>
        <button data-page="templates" class="nav-item"><span>📚</span>空白範本</button>
        <button data-page="generate" class="nav-item"><span>📝</span>生成文件</button>
        <button data-page="files" class="nav-item"><span>🗂️</span>檔案庫</button>
        <button data-page="evaluation" class="nav-item"><span>📦</span>社團評鑑</button>
        <button data-page="settings" class="nav-item"><span>🏷️</span>社團資料</button>
      </nav>

      <div class="club-card">
        <div class="club-row">
          <div class="club-avatar">四</div>
          <div>
            <strong>四團平建</strong>
            <span>114 學年度評鑑展示</span>
          </div>
        </div>
        <div class="club-meta">
          <span>ODF 100%</span>
          <span>範本 12</span>
        </div>
      </div>

      <p class="site-credit">© 2026 ODFlow by 簡廷宇（Eric）</p>
    </aside>

    <main class="main">
      <header class="utilitybar">
        <div class="crumb">
          <span class="dot"></span>
          <strong id="utilitySection">Workbench</strong>
          <span id="utilityHint">一站式社團文件管理站</span>
        </div>
        <div class="utility-actions">
          <span class="chip soft">四團平建</span>
          <span class="chip soft">114 學年度</span>
          <button class="icon-btn" title="通知" aria-label="通知">🔔</button>
          <button class="profile-btn" title="目前登入使用者" aria-label="目前登入使用者">
            <span class="profile-avatar">簡</span>
            <span class="profile-name">簡廷宇</span>
          </button>
        </div>
      </header>

      <div class="page-head">
        <div>
          <span class="eyebrow">ODFLOW PRO</span>
          <h2 id="pageTitle">首頁</h2>
        </div>
      </div>

      <section id="app" class="content"></section>
    </main>
  </div>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
